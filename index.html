<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>曦曦的专属小宠物</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1 id="title-msg">嗨！等你好久啦</h1>
        
        <div class="pet-screen">
            <div id="pet-emoji" class="bouncing"> ( ^_^ ) </div>
            <div id="pet-speech">...</div>
        </div>

        <div class="stats">
            <div class="stat-item">🍗 饱食度: <span id="hunger">--</span>%</div>
            <div class="stat-item">⭐️ 开心值: <span id="mood">--</span>%</div>
        </div>

        <div class="actions">
            <button id="feed-btn" class="btn">喂好吃的</button>
            <button id="play-btn" class="btn">陪它玩耍</button>
        </div>

        <div class="footer-note">
            <p>提示：周一到周五它也在认真休息哦！</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
